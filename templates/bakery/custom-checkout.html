<style>
body{
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffe6f0, #fdf2ff);
    padding: 40px;
}

.checkout-container{
    max-width: 900px;
    margin: auto;
    background: white;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    padding: 40px;
}

.checkout-title{
    text-align: center;
    font-size: 28px;
    color: #d63384;
    margin-bottom: 30px;
}

.checkout-content{
    display: flex;
    gap: 40px;
    align-items: center;
    flex-wrap: wrap;
}

.cake-image{
    flex: 1;
    text-align: center;
}

.cake-image img{
    width: 100%;
    max-width: 350px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.order-details{
    flex: 1;
}

.order-details h3{
    margin-bottom: 20px;
    color: #333;
}

.detail-item{
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #eee;
    font-size: 16px;
}

.total-price{
    font-size: 20px;
    font-weight: bold;
    color: #ff69b4;
    margin-top: 20px;
}

.confirm-btn{
    margin-top: 30px;
    padding: 12px 25px;
    background: #ff69b4;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

.confirm-btn:hover{
    background: #e055a1;
}
</style>


<div class="checkout-container">
    <div class="checkout-title">
        🎂 Custom Cake Order Summary
    </div>

    <div class="checkout-content">

        <div class="cake-image">
            <img src="{{ data.cake_image }}" alt="Custom Cake">
        </div>

        <div class="order-details">
            <h3>Order Details</h3>

            <div class="detail-item">
                <span>Shape:</span>
                <span>{{ data.shape|title }}</span>
            </div>

            <div class="detail-item">
                <span>Layers:</span>
                <span>{{ data.layers }}</span>
            </div>

            <div class="detail-item">
                <span>Filling Color:</span>
                <span>{{ data.filling_color }}</span>
            </div>

            <div class="detail-item">
                <span>Cream:</span>
                <span>{{ data.cream }}</span>
            </div>

            <div class="detail-item">
                <span>Topping:</span>
                <span>{{ data.topping|title }}</span>
            </div>

            <div class="detail-item">
                <span>Message:</span>
                <span>{{ data.cake_name }}</span>
            </div>
            
            <div class="detail-item">
                <span>Weight:</span>
                <span>{{ data.weight }}</span>
            </div>

            <div class="total-price">
                Total: ₹ {{ data.price }}
            </div>
            <br>
            <form method="post" action="{% url 'checkout' %}">
    {% csrf_token %}

    <input type="hidden" name="is_custom" value="1">
    <input type="hidden" name="shape" value="{{ data.shape }}">
    <input type="hidden" name="layers" value="{{ data.layers }}">
    <input type="hidden" name="cream" value="{{ data.cream }}">
    <input type="hidden" name="topping" value="{{ data.topping }}">
    <input type="hidden" name="cake_name" value="{{ data.cake_name }}">
    <input type="hidden" name="price" value="{{ data.price }}">
    <input type="hidden" name="cake_image" value="{{ data.cake_image }}">

    <button type="submit" class="confirm-btn">
        Confirm Order
    </button>
</form>
        </div>

    </div>
</div>
