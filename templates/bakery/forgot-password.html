{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 30px;
            width: 380px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 10px;
        }
        p {
            text-align: center;
            color: #666;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #9958bc;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #5c237b;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Forgot Password</h2>
    <p>Enter your registered email to receive OTP</p>

    <form method="post">
    {% csrf_token %}
    <input type="email" name="email" placeholder="Enter email" required>
    <button type="submit">Send OTP</button>
    {% if error %}<p>{{ error }}</p>{% endif %}
</form>
</div>

</body>
</html>
